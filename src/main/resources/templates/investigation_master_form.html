<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Investigation Master Form</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap & Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fe;
            font-family: 'Segoe UI', sans-serif;
        }

        .card-header {
            background: linear-gradient(87deg, #5e72e4 0, #825ee4 100%);
            color: white;
            border-radius: .5rem .5rem 0 0;
        }

        .form-label {
            font-weight: 500;
        }

        .btn-primary {
            background-color: #5e72e4;
            border-color: #5e72e4;
        }

        .btn-primary:hover {
            background-color: #324cdd;
            border-color: #324cdd;
        }
    </style>
</head>
<body>

<div class="container my-5">
    <div class="card shadow-sm border-0">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h4 class="mb-0">
                <i class="fas fa-vial me-2"></i>
                <span th:text="${investigation.invId != null} ? 'Edit Investigation' : 'Add Investigation'"></span>
            </h4>
            <a th:href="@{/investigations}" class="btn btn-light btn-sm">
                <i class="fas fa-arrow-left me-1"></i> Back to List
            </a>
        </div>
        <div class="card-body">
            <form th:action="@{/investigations/save}" th:object="${investigation}" method="post" class="row g-3">
                <input type="hidden" th:field="*{invId}"/>

                <div class="col-md-6">
                    <label class="form-label">Investigation Code</label>
                    <input type="text" th:field="*{invCode}" class="form-control" placeholder="INV001" required />
                </div>

                <div class="col-md-6">
                    <label class="form-label">Category</label>
                    <input type="text" th:field="*{invCat}" class="form-control" required />
                </div>

                <div class="col-md-6">
                    <label class="form-label">Name</label>
                    <input type="text" th:field="*{invName}" class="form-control" required />
                </div>

                <div class="col-md-6">
                    <label class="form-label">Lab</label>
                    <input type="text" th:field="*{invLab}" class="form-control" />
                </div>

                <div class="col-md-6">
                    <label class="form-label">Room</label>
                    <input type="text" th:field="*{invRoom}" class="form-control" />
                </div>

                <div class="col-md-6">
                    <label class="form-label">Doctor</label>
                    <input type="text" th:field="*{invDoc}" class="form-control" />
                </div>

                <div class="col-md-6">
                    <label class="form-label">Charge</label>
                    <input type="number" step="0.01" th:field="*{invCharge}" class="form-control" required />
                </div>

                <div class="col-md-6">
                    <label class="form-label">Text 1</label>
                    <input type="text" th:field="*{invText1}" class="form-control" />
                </div>

                <div class="col-md-6">
                    <label class="form-label">Text 2</label>
                    <input type="text" th:field="*{invText2}" class="form-control" />
                </div>

                <div class="col-12">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-1"></i> Save
                    </button>
                    <a th:href="@{/investigations}" class="btn btn-secondary">
                        <i class="fas fa-times me-1"></i> Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
