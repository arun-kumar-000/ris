<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Investigation Master List</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Argon Dashboard & Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fe;
            font-family: 'Segoe UI', sans-serif;
        }

        .card-header {
            background: linear-gradient(87deg, #5e72e4 0, #825ee4 100%);
            color: white;
            border-radius: .5rem .5rem 0 0;
        }

        .table th {
            background-color: #f6f9fc;
            color: #5e72e4;
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        .table-hover tbody tr:hover {
            background-color: #f0f2f5;
        }

        .search-input {
            border: 1px solid #dee2e6;
            border-radius: .5rem;
            padding: .5rem 1rem;
        }

        .btn-primary {
            background-color: #5e72e4;
            border-color: #5e72e4;
        }

        .btn-primary:hover {
            background-color: #324cdd;
            border-color: #324cdd;
        }

        @media (max-width: 768px) {
            .table-responsive {
                overflow-x: auto;
            }

            .card-header h4 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

<div class="container my-5">
    <div class="card shadow-sm border-0">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h4 class="mb-0"><i class="fas fa-vials me-2"></i>Investigation Master</h4>
            <a th:href="@{/investigations/add}" class="btn btn-light btn-sm">
                <i class="fas fa-plus me-1"></i> Add New
            </a>
        </div>
        <div class="card-body">
            <form method="get" th:action="@{/investigations}">
                <div class="input-group mb-4">
                    <input type="text" name="keyword" class="form-control search-input"
                           placeholder="Search by Name or Code"
                           th:value="${param.keyword}">
                    <button class="btn btn-primary" type="submit"><i class="fas fa-search me-1"></i> Search</button>
                </div>
            </form>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Code</th>
                            <th>Category</th>
                            <th>Name</th>
                            <th>Charge</th>
                            <th>Room</th>
                            <th>Lab</th>
                            <th>Doctor</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="inv : ${investigations}">
                            <td th:text="${inv.invId}"></td>
                            <td th:text="${inv.invCode}"></td>
                            <td th:text="${inv.invCat}"></td>
                            <td th:text="${inv.invName}"></td>
                            <td th:text="${inv.invCharge}"></td>
                            <td th:text="${inv.invRoom}"></td>
                            <td th:text="${inv.invLab}"></td>
                            <td th:text="${inv.invDoc}"></td>
                            <td>
                                <a th:href="@{'/investigations/edit/' + ${inv.invId}}" class="btn btn-warning btn-sm me-1">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <a th:href="@{'/investigations/delete/' + ${inv.invId}}" class="btn btn-danger btn-sm"
                                   onclick="return confirm('Are you sure you want to delete this record?');">
                                    <i class="fas fa-trash-alt"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(investigations)}">
                            <td colspan="9" class="text-center text-muted">No records found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
